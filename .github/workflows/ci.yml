name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-migrate:
    name: Tests & migration check
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: casanomina_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Build calculator (required by api)
        run: npm -w packages/calculator run build

      - name: Run unit tests
        run: npm test

      - name: Run migrations against clean DB
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/casanomina_test
        run: npm -w packages/api run db:migrate
